<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10X Memory Power Techniques - English</title>

  <link rel="stylesheet" href="/CSS/index.css">
  <link rel="shortcut icon" href="/assets/favicon.ico" type="image/x-icon">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="main">

    <!-- Header -->
    <div class="header" style="display:flex; justify-content:center;">
      <img style="width:170px;" src="assets/untitled-2.png" alt="logo">
    </div>

    <!-- Hero Section -->
    <div id="hero-section">
      <h2 class="hero-h2">10X Memory Power Techniques - English</h2>
      <div class="hero-img">
        <img src="https://d3jt6ku4g6z5l8.cloudfront.net/IMAGE/673c941b7b4ac10beb8a8360/1684498_1000290683 1.jpg" alt="">
      </div>
    </div>

    <!-- Form -->
    <div id="form-div">
      <form id="form">

        <div id="user-section">

          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Full Name" required>
          </div>

          <div class="form-group">
            <label for="wanumber">Phone Number</label>
            <input type="tel" id="wanumber" placeholder="Enter your WhatsApp number" required>
          </div>

          <div class="form-group">
            <label for="email">Your Email Address</label>
            <input type="email" id="email" placeholder="Email">
          </div>

          <div class="form-group">
            <label for="reason">School Name</label>
            <textarea id="reason" placeholder="Enter School Name" required></textarea>
          </div>

          <div class="form-group">
            <label for="schoolArea">School Area</label>
            <input type="text" id="schoolArea" placeholder="Enter School Area" required>
          </div>

          <div class="form-group">
            <label for="className">Class</label>
            <input type="text" id="className" placeholder="Class" required>
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="Enter City" required>
          </div>

        </div>

        <button type="button" id="submitBtn" onclick="submitForm()">
          Register for Webinar
        </button>

      </form>
    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    function setLoading(isLoading) {
      const btn = document.getElementById('submitBtn');
      btn.textContent = isLoading ? 'Loading...' : 'Register for Webinar';
      btn.disabled = isLoading;
    }

    function submitForm() {

      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('wanumber').value.trim();

      if (!name) {
        alert('Please enter your full name.');
        return;
      }

      if (!phone || !/^\d{10}$/.test(phone)) {
        alert('Enter valid 10-digit phone number.');
        return;
      }

      setLoading(true);

      const formData = {
        fullName: name,
        phoneNumber: phone,
        email: document.getElementById('email').value,
        schoolName: document.getElementById('reason').value,
        schoolArea: document.getElementById('schoolArea').value,
        class: document.getElementById('className').value,
        city: document.getElementById('city').value
      };

      // ✅ Save to Google Sheet
      fetch('https://script.google.com/macros/s/AKfycbzFc1XUTFZj0RkL1tvK8l2tOkkw9D683Kdht_Rq7YnbtR78BmTUsDRDNKr5S73tYGK-/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData),
      });

      // ✅ Send WhatsApp Campaign
      const aiSensyData = {
  apiKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY5M2FjNTZiNDMwZjRkMGQ4OWE2N2RlMyIsIm5hbWUiOiJQQURITyBJTkRJQSBDTFVCIiwiYXBwTmFtZSI6IkFpU2Vuc3kiLCJjbGllbnRJZCI6IjY3MmRhNDQ1ZTU4N2NkMGJlZDcxZTM1MyIsImFjdGl2ZVBsYW4iOiJGUkVFX0ZPUkVWRVIiLCJpYXQiOjE3NjU0NTkzMDd9.9jx0SMynu-kuzazRs9KI4Sds_sEI5QzRO0U_hngWG20",
  campaignName: "memoryv23",
  destination: `91${phone}`,
  userName: name,
  source: "landing-page",
  media: {
    url: "https://d3jt6ku4g6z5l8.cloudfront.net/IMAGE/693ac56b430f4d0d89a67de3/5727258_IMG20251127WA00001.jpg",
  },
};

      fetch('https://backend.aisensy.com/campaign/t1/api/v2', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(aiSensyData),
      })
      .then(() => {
        setLoading(false);

        // ✅ FINAL REDIRECT (FIXED)
        window.location.href = "https://chat.whatsapp.com/Ikc9IOffRF66w7mnmXsCQg";
      })
      .catch(() => {
        setLoading(false);
        alert('Something went wrong. Please try again.');
      });

    }
  </script>

</body>
</html>
